name: Build CKPool image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_DIR: qbitleap-qbitleapbtc/upstream/qbit-mining-bootstrap
  IMAGE_NAME: ghcr.io/qbitleap/qbitleapbtc-ckpool

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load pinned CKPool source
        id: ckpool
        working-directory: ${{ env.UPSTREAM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          source config/versions.env
          echo "git_url=${CKPOOL_GIT_URL}" >> "$GITHUB_OUTPUT"
          echo "git_ref=${CKPOOL_GIT_REF}" >> "$GITHUB_OUTPUT"

      - name: Build and publish CKPool
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.UPSTREAM_DIR }}
          file: ${{ env.UPSTREAM_DIR }}/docker/ckpool/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            CKPOOL_GIT_URL=${{ steps.ckpool.outputs.git_url }}
            CKPOOL_GIT_REF=${{ steps.ckpool.outputs.git_ref }}
          tags: |
            ${{ env.IMAGE_NAME }}:0.2.2
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
