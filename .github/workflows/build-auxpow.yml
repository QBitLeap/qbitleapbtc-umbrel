name: Build AuxPoW image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_DIR: qbitleap-qbitleapbtc/upstream/qbit-mining-bootstrap
  AUXPOW_DIR: qbitleap-qbitleapbtc/auxpow
  IMAGE_NAME: ghcr.io/qbitleap/qbitleapbtc-auxpow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify official AuxPoW source
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat "${UPSTREAM_DIR}/VERSION")" = "1.0.0"
          test -f "${UPSTREAM_DIR}/lab/auxpow/auxpow_coordinator.py"
          test -f "${UPSTREAM_DIR}/lab/auxpow/stratum_codec.py"
          test -f "${UPSTREAM_DIR}/lab/auxpow/vardiff.py"
          test -f "${AUXPOW_DIR}/Dockerfile"
          test -f "${AUXPOW_DIR}/start-auxpow.sh"
          test -f "${AUXPOW_DIR}/telemetry_runner.py"

      - name: Prepare pinned Qbit source
        working-directory: ${{ env.UPSTREAM_DIR }}
        run: |
          ./scripts/prepare-qbit-source.sh
          test -f generated/qbit-src/test/functional/test_framework/auxpow.py
          cat generated/qbit-src/.qbit-source-commit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish AuxPoW
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.AUXPOW_DIR }}/Dockerfile
          build-contexts: |
            qbit-src=${{ env.UPSTREAM_DIR }}/generated/qbit-src
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:0.4.2
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
