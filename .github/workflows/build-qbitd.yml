name: Build Qbit Core image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_DIR: qbitleap-qbitleapbtc/upstream/qbit-mining-bootstrap
  IMAGE_NAME: ghcr.io/qbitleap/qbitleapbtc-qbitd

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare pinned Qbit source
        working-directory: ${{ env.UPSTREAM_DIR }}
        run: |
          ./scripts/prepare-qbit-source.sh
          test -f generated/qbit-src/CMakeLists.txt
          cat generated/qbit-src/.qbit-source-commit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Qbit Core
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.UPSTREAM_DIR }}
          file: ${{ env.UPSTREAM_DIR }}/docker/qbit/Dockerfile
          build-contexts: |
            qbit-src=${{ env.UPSTREAM_DIR }}/generated/qbit-src
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:0.1.0
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
