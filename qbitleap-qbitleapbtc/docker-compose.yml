version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: qbitleap-qbitleapbtc_dashboard_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  dashboard:
    image: ghcr.io/qbitleap/qbitleapbtc-dashboard:0.4.0
    restart: unless-stopped
    environment:
      DASHBOARD_PORT: "8080"
      QBIT_RPC_HOST: qbitd
      QBIT_RPC_PORT: "8352"
      QBIT_RPC_USER: qbitrpc
      QBIT_RPC_PASSWORD: ${APP_PASSWORD}
      BITCOIN_RPC_HOST: ${APP_BITCOIN_NODE_IP}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIN_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      AUXPOW_HOST: auxpow
      AUXPOW_PORT: "3335"
      CONFIG_DIR: /config
      TELEMETRY_FILE: /telemetry/telemetry.json
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${APP_DATA_DIR}/telemetry:/telemetry:ro
    depends_on:
      qbitd:
        condition: service_healthy

  qbit_config:
    image: alpine:3.21
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/config:/config
    command:
      - /bin/sh
      - -c
      - |
        set -eu

        mkdir -p /config

        cat > /config/qbit.conf <<'EOF_CONFIG'
        # QBitLeap managed configuration

        server=1
        txindex=1
        rpcbind=0.0.0.0
        zmqpubrawblock=tcp://0.0.0.0:28332
        zmqpubrawtx=tcp://0.0.0.0:28333
        EOF_CONFIG

        touch /config/qbt-payout-address.txt
        touch /config/btc-payout-address.txt
        chmod 600 /config/qbit.conf
        chmod 600 /config/qbt-payout-address.txt
        chmod 600 /config/btc-payout-address.txt

  qbitd:
    image: ghcr.io/qbitleap/qbitleapbtc-qbitd:0.1.0
    restart: unless-stopped
    stop_grace_period: 2m

    depends_on:
      qbit_config:
        condition: service_completed_successfully

    environment:
      QBIT_PRODUCTION: "1"
      QBIT_TOOLS_PRODUCTION: "1"
      QBIT_CHAIN: mainnet
      CKPOOL_NON_TEST_READINESS_GATE: "1"
      QBIT_MAINNET_LAUNCH_READINESS_CHECKS_ENABLED: "1"

    command:
      - -printtoconsole
      - -conf=/etc/qbit/qbit.conf
      - -datadir=/var/lib/qbit
      - -rpcuser=qbitrpc
      - -rpcpassword=${APP_PASSWORD}
      - -rpcbind=0.0.0.0
      - -rpcallowip=127.0.0.1
      - -rpcallowip=10.0.0.0/8
      - -rpcallowip=172.16.0.0/12
      - -rpcallowip=192.168.0.0/16
      - -rpcworkqueue=64
      - -rpcport=8352
      - -port=8355
      - -listen=1
      - -fallbackfee=0.00001000
      - -chain=main
      - -asert

    ports:
      - "8355:8355"

    volumes:
      - ${APP_DATA_DIR}/config/qbit.conf:/etc/qbit/qbit.conf:ro
      - ${APP_DATA_DIR}/qbit:/var/lib/qbit

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          qbit-cli
          -rpcconnect=127.0.0.1
          -rpcport=8352
          -rpcuser=qbitrpc
          -rpcpassword="${APP_PASSWORD}"
          getblockchaininfo >/dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  auxpow:
    image: ghcr.io/qbitleap/qbitleapbtc-auxpow:0.4.2
    restart: unless-stopped

    depends_on:
      qbitd:
        condition: service_healthy

    environment:
      AUXPOW_MODE: stratum
      AUXPOW_TEMPLATE_MAX_AGE_SECONDS: "120"
      AUXPOW_TEMPLATE_MAX_FUTURE_SECONDS: "7200"
      AUXPOW_STRATUM_REFRESH_FAILURE_EXIT_SECONDS: "120"
      AUXPOW_STRATUM_BIND: 0.0.0.0
      AUXPOW_STRATUM_PORT: "3335"
      AUXPOW_STRATUM_SHARE_DIFF: "1"
      AUXPOW_STRATUM_VARDIFF_ENABLED: "1"
      AUXPOW_STRATUM_VARDIFF_TARGET_SHARE_SECONDS: "5"
      AUXPOW_STRATUM_VARDIFF_MIN_DIFF: "1024"
      AUXPOW_STRATUM_VARDIFF_MAX_DIFF: "4294967296"
      AUXPOW_STRATUM_VARDIFF_RETARGET_SECONDS: "120"
      AUXPOW_STRATUM_VARDIFF_MAX_STEP_FACTOR: "4"
      AUXPOW_STRATUM_VARDIFF_MAX_STEP_DOWN_FACTOR: "2"
      AUXPOW_STRATUM_VARDIFF_EWMA_ALPHA: "0.4"
      AUXPOW_STRATUM_VARDIFF_RETARGET_TOLERANCE: "0.25"
      AUXPOW_STRATUM_VARDIFF_STARTUP_DIFF: "8192"
      AUXPOW_STRATUM_VARDIFF_APPLY_MODE: next_job
      AUXPOW_STRATUM_MIN_ADVERTISED_DIFF: "0"
      AUXPOW_STRATUM_POLL_SECONDS: "5"
      AUXPOW_STRATUM_JOB_MAX_AGE_SECONDS: "2700"
      AUXPOW_STRATUM_VERSION_MASK: 1fffe000
      AUXPOW_STRATUM_HEADER_VARIANT: canonical
      AUXPOW_STRATUM_ACCEPT_DIAGNOSTIC_VARIANT: "0"
      AUXPOW_STRATUM_STATS_INTERVAL_SECONDS: "60"
      QBIT_CHAIN: mainnet
      QBIT_EXPECTED_GENESIS_HASH: 0000000000004d60aa5d46013991d0a0e2995d89ee98e53068ae196d763e79f2
      QBIT_RPC_HOST: qbitd
      QBIT_RPC_PORT: "8352"
      QBIT_RPC_USER: qbitrpc
      QBIT_RPC_PASSWORD: ${APP_PASSWORD}
      QBIT_MINER_ADDRESS_FILE: /config/qbt-payout-address.txt
      BITCOIN_CHAIN: mainnet
      BITCOIN_EXPECTED_GENESIS_HASH: 000000000019d6689c085ae165831e934ff763ae46a2a6c172b3f1b60a8ce26f
      BITCOIN_RPC_HOST: ${APP_BITCOIN_NODE_IP}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIN_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      BITCOIN_MINER_ADDRESS_FILE: /config/btc-payout-address.txt
      AUXPOW_ADDRESS_POLL_SECONDS: "2"
      AUXPOW_TELEMETRY_FILE: /telemetry/telemetry.json

    ports:
      - "3335:3335"

    volumes:
      - ${APP_DATA_DIR}/config:/config:ro
      - ${APP_DATA_DIR}/telemetry:/telemetry

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import socket; s=socket.create_connection(('127.0.0.1',3335),2); s.close()"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
