version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: qbitleap-qbitleapbtc_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  web_config:
  image: alpine:3.21
  restart: "no"
  volumes:
    - ${APP_DATA_DIR}/web:/web
  command:
    - /bin/sh
    - -c
    - |
      set -eu

      mkdir -p /web

      cat > /web/index.html <<'EOF'
      <!doctype html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>QBitLeap BTC</title>
        <style>
          body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #111;
            color: #fff;
            font-family: system-ui, sans-serif;
          }

          main {
            max-width: 640px;
            padding: 40px;
            text-align: center;
          }

          h1 {
            margin-bottom: 12px;
          }

          p {
            color: #bbb;
            line-height: 1.6;
          }
        </style>
      </head>
      <body>
        <main>
          <h1>QBitLeap BTC</h1>
          <p>Umbrel wrapper installed successfully.</p>
          <p>Qbit Core is running and synchronizing.</p>
        </main>
      </body>
      </html>
      EOF

  web:
  image: nginx:1.27-alpine
  restart: on-failure
  depends_on:
    web_config:
      condition: service_completed_successfully
  volumes:
    - ${APP_DATA_DIR}/web:/usr/share/nginx/html:ro

  qbit_config:
    image: alpine:3.21
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/config:/config
    command:
      - /bin/sh
      - -c
      - |
        set -eu

        mkdir -p /config

        cat > /config/qbit.conf <<'EOF'
        # QBitLeap managed configuration

        server=1
        txindex=1
        rpcbind=0.0.0.0
        zmqpubrawblock=tcp://0.0.0.0:28332
        zmqpubrawtx=tcp://0.0.0.0:28333
        EOF

        chmod 600 /config/qbit.conf

  qbitd:
    image: ghcr.io/qbitleap/qbitleapbtc-qbitd:0.1.0
    restart: unless-stopped
    stop_grace_period: 2m

    depends_on:
      qbit_config:
        condition: service_completed_successfully

    environment:
      QBIT_PRODUCTION: "1"
      QBIT_TOOLS_PRODUCTION: "1"
      QBIT_CHAIN: mainnet
      CKPOOL_NON_TEST_READINESS_GATE: "1"
      QBIT_MAINNET_LAUNCH_READINESS_CHECKS_ENABLED: "1"

    command:
      - -printtoconsole
      - -conf=/etc/qbit/qbit.conf
      - -datadir=/var/lib/qbit
      - -rpcuser=qbitrpc
      - -rpcpassword=${APP_PASSWORD}
      - -rpcbind=0.0.0.0
      - -rpcallowip=127.0.0.1
      - -rpcallowip=10.0.0.0/8
      - -rpcallowip=172.16.0.0/12
      - -rpcallowip=192.168.0.0/16
      - -rpcworkqueue=64
      - -rpcport=8352
      - -port=8355
      - -listen=1
      - -fallbackfee=0.00001000
      - -chain=main
      - -asert

    ports:
      - "8355:8355"

    volumes:
      - ${APP_DATA_DIR}/config/qbit.conf:/etc/qbit/qbit.conf:ro
      - ${APP_DATA_DIR}/qbit:/var/lib/qbit

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          qbit-cli
          -rpcconnect=127.0.0.1
          -rpcport=8352
          -rpcuser=qbitrpc
          -rpcpassword="${APP_PASSWORD}"
          getblockchaininfo >/dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
