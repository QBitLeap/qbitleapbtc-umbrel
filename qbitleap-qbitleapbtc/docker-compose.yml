version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: qbitleap-qbitleapbtc_dashboard_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  dashboard:
    image: ghcr.io/qbitleap/qbitleapbtc-dashboard:0.2.7
    restart: unless-stopped
    environment:
      DASHBOARD_PORT: "8080"
      QBIT_RPC_HOST: qbitd
      QBIT_RPC_PORT: "8352"
      QBIT_RPC_USER: qbitrpc
      QBIT_RPC_PASSWORD: ${APP_PASSWORD}
      CKPOOL_HOST: ckpool
      CKPOOL_PORT: "3333"
      BITCOIN_RPC_HOST: ${APP_BITCOIN_NODE_IP}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIN_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      CONFIG_DIR: /config
      CKPOOL_LOG_DIR: /var/log/ckpool
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${APP_DATA_DIR}/ckpool/logs:/var/log/ckpool:ro
    depends_on:
      qbitd:
        condition: service_healthy

  qbit_config:
    image: alpine:3.21
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/config:/config
    command:
      - /bin/sh
      - -c
      - |
        set -eu

        mkdir -p /config

        cat > /config/qbit.conf <<'EOF_CONFIG'
        # QBitLeap managed configuration

        server=1
        txindex=1
        rpcbind=0.0.0.0
        zmqpubrawblock=tcp://0.0.0.0:28332
        zmqpubrawtx=tcp://0.0.0.0:28333
        EOF_CONFIG

        touch /config/qbt-payout-address.txt
        touch /config/btc-payout-address.txt
        chmod 600 /config/qbit.conf
        chmod 600 /config/qbt-payout-address.txt
        chmod 600 /config/btc-payout-address.txt

  qbitd:
    image: ghcr.io/qbitleap/qbitleapbtc-qbitd:0.1.0
    restart: unless-stopped
    stop_grace_period: 2m

    depends_on:
      qbit_config:
        condition: service_completed_successfully

    environment:
      QBIT_PRODUCTION: "1"
      QBIT_TOOLS_PRODUCTION: "1"
      QBIT_CHAIN: mainnet
      CKPOOL_NON_TEST_READINESS_GATE: "1"
      QBIT_MAINNET_LAUNCH_READINESS_CHECKS_ENABLED: "1"

    command:
      - -printtoconsole
      - -conf=/etc/qbit/qbit.conf
      - -datadir=/var/lib/qbit
      - -rpcuser=qbitrpc
      - -rpcpassword=${APP_PASSWORD}
      - -rpcbind=0.0.0.0
      - -rpcallowip=127.0.0.1
      - -rpcallowip=10.0.0.0/8
      - -rpcallowip=172.16.0.0/12
      - -rpcallowip=192.168.0.0/16
      - -rpcworkqueue=64
      - -rpcport=8352
      - -port=8355
      - -listen=1
      - -fallbackfee=0.00001000
      - -chain=main
      - -asert

    ports:
      - "8355:8355"

    volumes:
      - ${APP_DATA_DIR}/config/qbit.conf:/etc/qbit/qbit.conf:ro
      - ${APP_DATA_DIR}/qbit:/var/lib/qbit

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          qbit-cli
          -rpcconnect=127.0.0.1
          -rpcport=8352
          -rpcuser=qbitrpc
          -rpcpassword="${APP_PASSWORD}"
          getblockchaininfo >/dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  ckpool:
    image: ghcr.io/qbitleap/qbitleapbtc-ckpool:0.2.6
    restart: unless-stopped

    depends_on:
      qbitd:
        condition: service_healthy

    environment:
      QBIT_PRODUCTION: "1"
      QBIT_TOOLS_PRODUCTION: "1"
      QBIT_MAINNET_LAUNCH_READINESS_CHECKS_ENABLED: "1"
      QBIT_CHAIN: mainnet
      QBIT_RPC_HOST: qbitd
      QBIT_RPC_PORT: "8352"
      QBIT_RPC_USER: qbitrpc
      QBIT_RPC_PASSWORD: ${APP_PASSWORD}
      QBIT_MINER_ADDRESS_FILE: /config/qbt-payout-address.txt
      QBIT_MINER_ADDRESS_POLL_SECONDS: "2"
      CKPOOL_LOG_DIR: /var/log/ckpool
      CKPOOL_STATE_DIR: /var/lib/ckpool
      CKPOOL_SOCK_DIR: /tmp/qbitleap
      CKPOOL_STRATUM_PORT: "3333"
      CKPOOL_NON_TEST_READINESS_GATE: "1"

    ports:
      - "3333:3333"

    volumes:
      - ${APP_DATA_DIR}/config:/config:ro
      - ${APP_DATA_DIR}/ckpool/logs:/var/log/ckpool
      - ${APP_DATA_DIR}/ckpool/state:/var/lib/ckpool

    healthcheck:
      test:
        - CMD-SHELL
        - bash -lc 'exec 3<>/dev/tcp/127.0.0.1/3333'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
