manifestVersion: 1

id: qbitleap-qbitleapbtc
name: QBitLeap BTC
tagline: Run Qbit merge mining on Umbrel
icon: https://raw.githubusercontent.com/qbitleap/qbitleapbtc-umbrel/main/qbitleap-qbitleapbtc/icon.svg
category: Bitcoin
version: "0.2.4"
port: 3000

description: >-
  QBitLeap BTC packages Qbit's official qbit-mining-bootstrap project
  as an Umbrel-friendly application with minimal upstream modifications.

  The app is intended to run the Qbit merge-mining stack through Umbrel,
  with persistent data, miner configuration, and live operational status.

developer: QBitLeap
website: https://github.com/Qbit-Foundation/qbit-mining-bootstrap
submitter: QBitLeap
submission: https://github.com/qbitleap/qbitleapbtc-umbrel
repo: https://github.com/qbitleap/qbitleapbtc-umbrel
support: https://github.com/qbitleap/qbitleapbtc-umbrel/issues

gallery: []

releaseNotes: >-
  Packages the dashboard as a dedicated container image and adds an Umbrel CKPool
  startup wrapper that waits for the saved QBT payout address before launching the
  upstream CKPool process. needed to be pushed to 0.2.4

dependencies:
  - bitcoin

path: ""
defaultUsername: ""
defaultPassword: ""
